name: Email Security Report
description: Send the bandit and pip-audit security scan reports via Gmail SMTP.

inputs:
  bandit-report-path:
    description: Path to the bandit JSON report
    required: true
  pip-audit-report-path:
    description: Path to the pip-audit JSON report
    required: false
    default: ""
  smtp-user:
    description: Gmail address for SMTP login
    required: true
  smtp-password:
    description: Gmail app password
    required: true
  recipient:
    description: Email recipient (defaults to smtp-user)
    required: false

runs:
  using: composite
  steps:
    - name: Send security report email
      shell: bash
      env:
        BANDIT_REPORT_PATH: ${{ inputs.bandit-report-path }}
        PIP_AUDIT_REPORT_PATH: ${{ inputs.pip-audit-report-path }}
        SMTP_USER: ${{ inputs.smtp-user }}
        SMTP_PASSWORD: ${{ inputs.smtp-password }}
        RECIPIENT: ${{ inputs.recipient || inputs.smtp-user }}
      run: python .github/scripts/send_security_report.py

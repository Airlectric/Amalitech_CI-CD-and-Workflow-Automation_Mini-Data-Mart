  data-flow-validation:
    name: Data Flow Validation
    runs-on: ubuntu-latest
    # needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Fix mount permissions
        run: |
          mkdir -p data/data_docs logs
          chmod -R 777 data logs

      - name: Start services
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for Airflow to be ready
        run: |
          AIRFLOW_READY=false
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v2/monitor/health >/dev/null 2>&1; then
              echo "Airflow API is ready"
              AIRFLOW_READY=true
              break
            fi
            echo "Waiting for Airflow... ($i/60)"
            sleep 5
          done
          if [ "$AIRFLOW_READY" = "false" ]; then
            echo "ERROR: Airflow API did not become healthy"
            echo "=== airflow-api-server logs ==="
            docker compose logs airflow-api-server --tail=50
            echo "=== airflow-init logs ==="
            docker compose logs airflow-init --tail=30
            exit 1
          fi

      - name: Wait for DAGs to be parsed
        run: |
          echo "Waiting for DAGs to be registered..."
          for i in $(seq 1 30); do
            COUNT=$(docker compose exec -T airflow-api-server airflow dags list -o plain 2>/dev/null | grep -c "^" || echo "0")
            echo "  DAGs found: $COUNT ($i/30)"
            if [ "$COUNT" -ge 4 ]; then
              echo "All DAGs registered"
              break
            fi
            sleep 10
          done

      - name: Check scheduler and worker health
        run: |
          echo "=== Container Status ==="
          docker compose ps

          echo ""
          echo "=== Scheduler logs (last 20 lines) ==="
          docker compose logs airflow-scheduler --tail=20

          echo ""
          echo "=== Worker logs (last 20 lines) ==="
          docker compose logs airflow-worker --tail=20

      - name: Unpause all DAGs via database
        run: |
          echo "Unpausing all DAGs directly in the metadata database..."
          docker compose exec -T postgres psql -U airflow -d airflow -c "UPDATE dag SET is_paused = false;"
          echo "Verifying unpause:"
          docker compose exec -T postgres psql -U airflow -d airflow -c "SELECT dag_id, is_paused FROM dag ORDER BY dag_id;"

      - name: Trigger and validate DAGs
        run: |
          get_dag_run_state() {
            local dag_id=$1
            docker compose exec -T postgres psql -U airflow -d airflow -t -c \
              "SELECT state FROM dag_run WHERE dag_id = '$dag_id' ORDER BY start_date DESC LIMIT 1;" | tr -d ' '
          }

          trigger_and_wait() {
            local dag_id=$1
            echo "--- Triggering $dag_id ---"
            docker compose exec -T airflow-scheduler airflow dags trigger "$dag_id"
            echo "--- Waiting for $dag_id ---"
            for i in $(seq 1 60); do
              STATE=$(get_dag_run_state "$dag_id")
              if [ "$STATE" = "success" ]; then
                echo "$dag_id: SUCCESS"
                return 0
              elif [ "$STATE" = "failed" ]; then
                echo "$dag_id: FAILED"
                echo "=== Task instance states ==="
                docker compose exec -T postgres psql -U airflow -d airflow -c \
                  "SELECT task_id, state, start_date, end_date FROM task_instance WHERE dag_id = '$dag_id' ORDER BY start_date DESC LIMIT 10;"
                docker compose logs airflow-worker --tail=30
                docker compose logs airflow-scheduler --tail=20
                return 1
              fi
              echo "  $dag_id: state=$STATE ($i/60)"
              sleep 10
            done
            echo "ERROR: $dag_id timed out (last state: $STATE)"
            echo "=== Task instance states ==="
            docker compose exec -T postgres psql -U airflow -d airflow -c \
              "SELECT task_id, state, start_date, end_date FROM task_instance WHERE dag_id = '$dag_id' ORDER BY start_date DESC LIMIT 10;"
            echo "=== Scheduler logs ==="
            docker compose logs airflow-scheduler --tail=30
            echo "=== Worker logs ==="
            docker compose logs airflow-worker --tail=30
            return 1
          }

          echo "=== Step 1: Generate sample data ==="
          trigger_and_wait generate_sample_data

          echo ""
          echo "=== Validate: MinIO Bronze layer ==="
          OBJECTS=$(docker compose exec -T minio mc ls local/bronze/ 2>/dev/null | wc -l || echo "0")
          echo "MinIO bronze objects: $OBJECTS"

          echo ""
          echo "=== Step 2: Ingest bronze to silver ==="
          trigger_and_wait ingest_bronze_to_silver

          echo ""
          echo "=== Validate: Silver layer ==="
          SILVER_COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "SELECT COUNT(*) FROM silver.sales;" | tr -d ' ')
          echo "silver.sales row count: $SILVER_COUNT"
          if [ "$SILVER_COUNT" -eq 0 ]; then
            echo "ERROR: No data in silver.sales after ingestion"
            exit 1
          fi
          echo "Silver layer validated: $SILVER_COUNT rows"

          echo ""
          echo "=== Step 3: Silver to gold aggregation ==="
          trigger_and_wait silver_to_gold

      - name: "Validate: Gold layer has aggregated data"
        run: |
          echo "=== Gold Layer Validation ==="
          for table in daily_sales product_performance customer_analytics store_performance category_insights; do
            COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "SELECT COUNT(*) FROM gold.$table;" | tr -d ' ')
            echo "gold.$table: $COUNT rows"
            if [ "$COUNT" -eq 0 ]; then
              echo "ERROR: No data in gold.$table"
              exit 1
            fi
          done
          echo "All gold tables validated"

      - name: "Validate: Metabase can query dashboards"
        run: |
          echo "Checking Metabase is accessible..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Metabase is healthy"
              break
            fi
            sleep 10
          done

      - name: "Summary: End-to-end data flow"
        run: |
          echo "========================================="
          echo "  DATA FLOW VALIDATION COMPLETE"
          echo "========================================="
          echo ""
          echo "MinIO (Bronze) -> Airflow -> PostgreSQL (Silver) -> PostgreSQL (Gold) -> Metabase"
          echo ""
          docker compose exec -T postgres psql -U airflow -d airflow -t -c "
            SELECT 'silver.sales' AS layer, COUNT(*) AS rows FROM silver.sales
            UNION ALL SELECT 'gold.daily_sales', COUNT(*) FROM gold.daily_sales
            UNION ALL SELECT 'gold.product_performance', COUNT(*) FROM gold.product_performance
            UNION ALL SELECT 'gold.customer_analytics', COUNT(*) FROM gold.customer_analytics
            UNION ALL SELECT 'gold.store_performance', COUNT(*) FROM gold.store_performance
            UNION ALL SELECT 'gold.category_insights', COUNT(*) FROM gold.category_insights
            UNION ALL SELECT 'quarantine.sales_failed', COUNT(*) FROM quarantine.sales_failed;
          "
          echo "========================================="

      - name: Tear down
        if: always()
        run: docker compose down

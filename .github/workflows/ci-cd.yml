name: CI/CD Pipeline

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests types-PyYAML

      - name: Lint with ruff
        run: ruff check dags/ scripts/ tests/

      - name: Check formatting with ruff
        run: ruff format --check dags/ scripts/ tests/

      - name: Type check with mypy
        run: mypy dags/ scripts/ --ignore-missing-imports
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit tests
        run: pytest tests/ -m "not integration" --junitxml=test-results.xml --cov=dags --cov=scripts --cov-report=xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]" pip-audit
          pip install -r requirements.txt

      - name: Run bandit security scan
        run: bandit -r dags/ scripts/ -c pyproject.toml -ll -f json -o bandit-report.json

      - name: Run pip-audit
        run: pip-audit -r requirements.txt
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

      - name: Extract SMTP credentials from ENV_FILE
        if: always()
        run: |
          echo "${{ secrets.ENV_FILE }}" > /tmp/.env.ci
          echo "SMTP_USER=$(grep '^AIRFLOW__SMTP__SMTP_USER=' /tmp/.env.ci | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "SMTP_PASSWORD=$(grep '^AIRFLOW__SMTP__SMTP_PASSWORD=' /tmp/.env.ci | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          rm /tmp/.env.ci

      - name: Email security report
        if: always()
        uses: ./.github/actions/email-report
        with:
          report-path: bandit-report.json
          smtp-user: ${{ env.SMTP_USER }}
          smtp-password: ${{ env.SMTP_PASSWORD }}

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, unit-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/airflow
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Airflow environment
        uses: ./.github/actions/setup-airflow
        with:
          env-file-content: ${{ secrets.ENV_FILE }}

      - name: Verify all containers are running
        run: |
          echo "=== Container Status ==="
          docker compose ps
          RUNNING=$(docker compose ps --format json | grep -c '"running"' || true)
          echo "Running containers: $RUNNING"
          if [ "$RUNNING" -lt 10 ]; then
            echo "ERROR: Expected at least 10 running containers"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Verify database schemas exist
        run: |
          docker compose exec -T postgres psql -U airflow -d airflow -c "
            SELECT schema_name FROM information_schema.schemata
            WHERE schema_name IN ('silver', 'gold', 'metadata', 'quarantine', 'audit')
            ORDER BY schema_name;
          "
          SCHEMA_COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "
            SELECT COUNT(*) FROM information_schema.schemata
            WHERE schema_name IN ('silver', 'gold', 'metadata', 'quarantine', 'audit');
          " | tr -d ' ')
          if [ "$SCHEMA_COUNT" -ne 5 ]; then
            echo "ERROR: Expected 5 schemas, found $SCHEMA_COUNT"
            exit 1
          fi
          echo "All 5 schemas verified"

      - name: Tear down test environment
        if: always()
        run: docker compose down

  data-flow-validation:
    name: Data Flow Validation
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Airflow environment
        uses: ./.github/actions/setup-airflow
        with:
          env-file-content: ${{ secrets.ENV_FILE }}

      - name: "Step 1: Generate sample data"
        uses: ./.github/actions/trigger-dag
        with:
          dag-id: generate_sample_data

      - name: "Validate: MinIO Bronze layer"
        run: |
          OBJECTS=$(docker compose exec -T minio mc ls local/bronze/ 2>/dev/null | wc -l || echo "0")
          echo "MinIO bronze objects: $OBJECTS"

      - name: "Step 2: Ingest bronze to silver"
        uses: ./.github/actions/trigger-dag
        with:
          dag-id: ingest_bronze_to_silver

      - name: "Validate: Silver layer"
        uses: ./.github/actions/validate-layer
        with:
          tables: silver.sales

      - name: "Step 3: Silver to gold aggregation"
        uses: ./.github/actions/trigger-dag
        with:
          dag-id: silver_to_gold

      - name: "Validate: Gold layer"
        uses: ./.github/actions/validate-layer
        with:
          tables: gold.daily_sales gold.product_performance gold.customer_analytics gold.store_performance gold.category_insights

      - name: "Validate: Metabase health"
        run: |
          echo "Checking Metabase is accessible..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Metabase is healthy"
              break
            fi
            sleep 10
          done

      - name: "Summary: End-to-end data flow"
        run: |
          echo "========================================="
          echo "  DATA FLOW VALIDATION COMPLETE"
          echo "========================================="
          echo ""
          echo "MinIO (Bronze) -> Airflow -> PostgreSQL (Silver) -> PostgreSQL (Gold) -> Metabase"
          echo ""
          docker compose exec -T postgres psql -U airflow -d airflow -t -c "
            SELECT 'silver.sales' AS layer, COUNT(*) AS rows FROM silver.sales
            UNION ALL SELECT 'gold.daily_sales', COUNT(*) FROM gold.daily_sales
            UNION ALL SELECT 'gold.product_performance', COUNT(*) FROM gold.product_performance
            UNION ALL SELECT 'gold.customer_analytics', COUNT(*) FROM gold.customer_analytics
            UNION ALL SELECT 'gold.store_performance', COUNT(*) FROM gold.store_performance
            UNION ALL SELECT 'gold.category_insights', COUNT(*) FROM gold.category_insights
            UNION ALL SELECT 'quarantine.sales_failed', COUNT(*) FROM quarantine.sales_failed;
          "
          echo "========================================="

      - name: Tear down
        if: always()
        run: docker compose down

name: CI/CD Pipeline

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests types-PyYAML

      - name: Lint with ruff
        run: ruff check dags/ scripts/ tests/

      - name: Check formatting with ruff
        run: ruff format --check dags/ scripts/ tests/

      - name: Type check with mypy
        run: mypy dags/ scripts/ --ignore-missing-imports
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run unit tests
        run: pytest tests/ -m "not integration" --junitxml=test-results.xml --cov=dags --cov=scripts --cov-report=xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]" pip-audit
          pip install -r requirements.txt

      - name: Run bandit security scan
        run: bandit -r dags/ scripts/ -c pyproject.toml -ll -f json -o bandit-report.json

      - name: Run pip-audit
        run: pip-audit -r requirements.txt
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, unit-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/airflow
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Fix mount permissions
        run: |
          mkdir -p data/data_docs logs
          chmod -R 777 data logs

      - name: Start services
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U airflow -d airflow 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 5
          done

          echo "Waiting for Airflow API..."
          AIRFLOW_READY=false
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v2/monitor/health >/dev/null 2>&1; then
              echo "Airflow API is ready"
              AIRFLOW_READY=true
              break
            fi
            echo "Waiting for Airflow... ($i/60)"
            sleep 5
          done
          if [ "$AIRFLOW_READY" = "false" ]; then
            echo "ERROR: Airflow API did not become healthy"
            echo "=== airflow-api-server logs ==="
            docker compose logs airflow-api-server --tail=50
            echo "=== airflow-init logs ==="
            docker compose logs airflow-init --tail=30
            exit 1
          fi

      - name: Verify all containers are running
        run: |
          echo "=== Container Status ==="
          docker compose ps
          RUNNING=$(docker compose ps --format json | grep -c '"running"' || true)
          echo "Running containers: $RUNNING"
          if [ "$RUNNING" -lt 10 ]; then
            echo "ERROR: Expected at least 10 running containers"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Verify database schemas exist
        run: |
          docker compose exec -T postgres psql -U airflow -d airflow -c "
            SELECT schema_name FROM information_schema.schemata
            WHERE schema_name IN ('silver', 'gold', 'metadata', 'quarantine', 'audit')
            ORDER BY schema_name;
          "
          SCHEMA_COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "
            SELECT COUNT(*) FROM information_schema.schemata
            WHERE schema_name IN ('silver', 'gold', 'metadata', 'quarantine', 'audit');
          " | tr -d ' ')
          if [ "$SCHEMA_COUNT" -ne 5 ]; then
            echo "ERROR: Expected 5 schemas, found $SCHEMA_COUNT"
            exit 1
          fi
          echo "All 5 schemas verified"

      - name: Tear down test environment
        if: always()
        run: docker compose down

  data-flow-validation:
    name: Data Flow Validation
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Fix mount permissions
        run: |
          mkdir -p data/data_docs logs
          chmod -R 777 data logs

      - name: Start services
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for Airflow to be ready
        run: |
          AIRFLOW_READY=false
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v2/monitor/health >/dev/null 2>&1; then
              echo "Airflow API is ready"
              AIRFLOW_READY=true
              break
            fi
            echo "Waiting for Airflow... ($i/60)"
            sleep 5
          done
          if [ "$AIRFLOW_READY" = "false" ]; then
            echo "ERROR: Airflow API did not become healthy"
            echo "=== airflow-api-server logs ==="
            docker compose logs airflow-api-server --tail=50
            echo "=== airflow-init logs ==="
            docker compose logs airflow-init --tail=30
            exit 1
          fi

      - name: Unpause DAGs
        run: |
          docker compose exec -T airflow-api-server airflow dags unpause generate_sample_data
          docker compose exec -T airflow-api-server airflow dags unpause ingest_bronze_to_silver
          docker compose exec -T airflow-api-server airflow dags unpause data_quality_checks
          docker compose exec -T airflow-api-server airflow dags unpause silver_to_gold

      - name: "Step 1: Generate sample data (MinIO ingestion)"
        run: |
          docker compose exec -T airflow-api-server airflow dags trigger generate_sample_data
          echo "Waiting for data generation..."
          for i in $(seq 1 30); do
            STATE=$(docker compose exec -T airflow-api-server airflow dags list-runs -d generate_sample_data -o plain 2>/dev/null | grep -o 'success\|failed' | head -1)
            if [ "$STATE" = "success" ]; then
              echo "generate_sample_data: SUCCESS"
              break
            elif [ "$STATE" = "failed" ]; then
              echo "generate_sample_data: FAILED"
              docker compose logs airflow-worker --tail=30
              exit 1
            fi
            sleep 10
          done

      - name: "Validate: Data exists in MinIO (Bronze layer)"
        run: |
          OBJECTS=$(docker compose exec -T minio mc ls local/bronze/ 2>/dev/null | wc -l || echo "0")
          echo "MinIO bronze objects: $OBJECTS"

      - name: "Step 2: Ingest bronze to silver (Airflow processing)"
        run: |
          docker compose exec -T airflow-api-server airflow dags trigger ingest_bronze_to_silver
          echo "Waiting for ingestion..."
          for i in $(seq 1 30); do
            STATE=$(docker compose exec -T airflow-api-server airflow dags list-runs -d ingest_bronze_to_silver -o plain 2>/dev/null | grep -o 'success\|failed' | head -1)
            if [ "$STATE" = "success" ]; then
              echo "ingest_bronze_to_silver: SUCCESS"
              break
            elif [ "$STATE" = "failed" ]; then
              echo "ingest_bronze_to_silver: FAILED"
              docker compose logs airflow-worker --tail=30
              exit 1
            fi
            sleep 10
          done

      - name: "Validate: Data exists in PostgreSQL silver layer"
        run: |
          SILVER_COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "SELECT COUNT(*) FROM silver.sales;" | tr -d ' ')
          echo "silver.sales row count: $SILVER_COUNT"
          if [ "$SILVER_COUNT" -eq 0 ]; then
            echo "ERROR: No data in silver.sales after ingestion"
            exit 1
          fi
          echo "Silver layer validated: $SILVER_COUNT rows"

      - name: "Step 3: Run silver to gold aggregation"
        run: |
          docker compose exec -T airflow-api-server airflow dags trigger silver_to_gold
          echo "Waiting for gold aggregation..."
          for i in $(seq 1 30); do
            STATE=$(docker compose exec -T airflow-api-server airflow dags list-runs -d silver_to_gold -o plain 2>/dev/null | grep -o 'success\|failed' | head -1)
            if [ "$STATE" = "success" ]; then
              echo "silver_to_gold: SUCCESS"
              break
            elif [ "$STATE" = "failed" ]; then
              echo "silver_to_gold: FAILED"
              docker compose logs airflow-worker --tail=30
              exit 1
            fi
            sleep 10
          done

      - name: "Validate: Gold layer has aggregated data"
        run: |
          echo "=== Gold Layer Validation ==="
          for table in daily_sales product_performance customer_analytics store_performance category_insights; do
            COUNT=$(docker compose exec -T postgres psql -U airflow -d airflow -t -c "SELECT COUNT(*) FROM gold.$table;" | tr -d ' ')
            echo "gold.$table: $COUNT rows"
            if [ "$COUNT" -eq 0 ]; then
              echo "ERROR: No data in gold.$table"
              exit 1
            fi
          done
          echo "All gold tables validated"

      - name: "Validate: Metabase can query dashboards"
        run: |
          echo "Checking Metabase is accessible..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Metabase is healthy"
              break
            fi
            sleep 10
          done

      - name: "Summary: End-to-end data flow"
        run: |
          echo "========================================="
          echo "  DATA FLOW VALIDATION COMPLETE"
          echo "========================================="
          echo ""
          echo "MinIO (Bronze) -> Airflow -> PostgreSQL (Silver) -> PostgreSQL (Gold) -> Metabase"
          echo ""
          docker compose exec -T postgres psql -U airflow -d airflow -t -c "
            SELECT 'silver.sales' AS layer, COUNT(*) AS rows FROM silver.sales
            UNION ALL SELECT 'gold.daily_sales', COUNT(*) FROM gold.daily_sales
            UNION ALL SELECT 'gold.product_performance', COUNT(*) FROM gold.product_performance
            UNION ALL SELECT 'gold.customer_analytics', COUNT(*) FROM gold.customer_analytics
            UNION ALL SELECT 'gold.store_performance', COUNT(*) FROM gold.store_performance
            UNION ALL SELECT 'gold.category_insights', COUNT(*) FROM gold.category_insights
            UNION ALL SELECT 'quarantine.sales_failed', COUNT(*) FROM quarantine.sales_failed;
          "
          echo "========================================="

      - name: Tear down
        if: always()
        run: docker compose down
